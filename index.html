<!DOCTYPE HTML>

<html>

<head>
 <meta charset="UTF-8">
 <title>A U R A</title>
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=Estedad:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
body{
    background: radial-gradient(circle at 50% -10%, #101014 0%, #060607 45%, #000000 80%);
    background-color: #000;
    font-family: 'Vazirmatn', sans-serif;
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
    padding-bottom: 110px;
    box-sizing: border-box;
}
a{
    text-decoration: none;
    color: inherit;
}

.logo{
    display: flex;
    justify-content: center;
}
.logoo{
    max-width: 550px;
    max-height: 550px;
    opacity: 0;
    animation: logoIntro 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes logoIntro{
    0%{   opacity: 0; transform: translateY(-55px) scale(0.8);  filter: blur(16px); }
    55%{  opacity: 1; }
    100%{ opacity: 1; transform: translateY(0) scale(1);        filter: blur(0); }
}


.item, .game{
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, rgba(255,255,255,0.17) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.09) 100%);
    backdrop-filter: blur(18px) saturate(220%) contrast(1.15) brightness(1.15);
    -webkit-backdrop-filter: blur(18px) saturate(220%) contrast(1.15) brightness(1.15);
    border: none;
    border-top: 1.5px solid rgba(255,255,255,0.8);
    border-radius: 30px;
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.45),
        inset 0 -18px 28px -14px rgba(255,255,255,0.07),
        inset 0 -1px 1px rgba(0,0,0,0.3),
        0 18px 38px rgba(0,0,0,0.55);
    color: rgba(247, 247, 247, 1);
}

.item::before, .game::before{
    content: "";
    position: absolute;
    top: -50%;
    left: -25%;
    width: 65%;
    height: 160%;
    background: linear-gradient(120deg, rgba(255,255,255,0.5), rgba(255,255,255,0) 60%);
    transform: rotate(-15deg);
    filter: blur(9px);
    mix-blend-mode: screen;
    pointer-events: none;
}

.item::after, .game::after{
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.06;
    mix-blend-mode: overlay;
    pointer-events: none;
    border-radius: inherit;
}

.item{
    width: 385px;
    min-height: 118px;
    margin-top: 10px;
    padding: 0 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-sizing: border-box;
}
.item .icon{
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.item .text{
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-align: right;
}
.item h3{
    margin: 0 0 5px 0;
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.2px;
}
.item p{
    margin: 0;
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 300;
    font-size: 12.5px;
    line-height: 1.7;
    color: rgba(255,255,255,0.55);
}

.game{
    width: 385px;
    min-height: 220px;
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 18px;
    gap: 16px;
    box-sizing: border-box;
}

.match-flags{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
}
.flag{
    width: 92px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
}
.vs{
    font-family: 'Estedad', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.45);
}
.match-result{
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.3px;
    color: rgba(247,247,247,1);
}
.odds-bar{
    width: 100%;
    display: flex;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.14);
}
.odds-side{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 7px 0;
    position: relative;
}
.odds-side.home{
    background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
}
.odds-side.away{
    background: linear-gradient(135deg, rgba(0, 222, 12, 0.3), rgba(2, 110, 0, 0.14));
}
.odds-side.home::after{
    content: "";
    position: absolute;
    top: 18%;
    bottom: 18%;
    left: 100%;
    width: 1px;
    background: rgba(255,255,255,0.18);
}
.odds-side.home .odds-value{
    color: #ffffff;
    text-shadow: 0 0 10px rgba(255,255,255,0.55), 0 0 2px rgba(255,255,255,0.8);
}
.odds-side.away .odds-value{
    color: #3CEB8C;
    text-shadow: 0 0 10px rgba(60,235,140,0.55), 0 0 2px rgba(60,235,140,0.8);
}
.odds-value{
    font-family: 'Estedad', sans-serif;
    font-weight: 800;
    font-size: 15.5px;
    color: rgba(247,247,247,1);
}
.odds-x{
    font-size: 12px;
    font-weight: 600;
    opacity: 0.7;
    margin-right: 1px;
}
.odds-label{
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 400;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
}

.glass-btn{
    width: 100%;
    padding: 13px 0;
    border-radius: 999px;
    text-align: center;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: rgba(255,255,255,0.97);
    backdrop-filter: blur(14px) saturate(200%);
    -webkit-backdrop-filter: blur(14px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.35);
}
.glass-btn::before{
    content: "";
    position: absolute;
    top: -60%;
    left: -20%;
    width: 60%;
    height: 220%;
    background: linear-gradient(120deg, rgba(255,255,255,0.45), rgba(255,255,255,0) 60%);
    transform: rotate(-15deg);
    filter: blur(8px);
    mix-blend-mode: screen;
    pointer-events: none;
}
.glass-btn.btn-red{
    background: linear-gradient(160deg, rgba(255, 0, 9, 0.55) 0%, rgba(150,15,15,0.4) 55%, rgba(255, 0, 26, 0.5) 100%);
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.45),
        inset 0 -8px 16px -10px rgba(0,0,0,0.4),
        0 10px 24px rgba(220,30,30,0.4);
}
.glass-btn.btn-green{
    background: linear-gradient(160deg, rgba(0, 255, 9, 0.55) 0%, rgba(15, 255, 15, 0.4) 55%, rgba(48, 168, 0, 0.5) 100%);
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.45),
        inset 0 -8px 16px -10px rgba(0,0,0,0.4),
        0 10px 24px rgba(7, 209, 0, 0.4);
}

.main{
    display: grid;
    justify-content: center;
}
h1{
    color: rgba(247, 247, 247, 1);
    font-family: 'Estedad', sans-serif;
    font-weight: 800;
    letter-spacing: 0.5px;
}
.mohtava{
    display: grid;
    justify-content: center;
}
.games{
    display: block;
}

/* ===== نوار پایین: ثابت، شیشه‌ای، بدون نویز ===== */
.bottom-nav{
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-radius: 999px;
    overflow: hidden;
    background: linear-gradient(160deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.03) 55%, rgba(255,255,255,0.09) 100%);
    backdrop-filter: blur(24px) saturate(220%) contrast(1.15) brightness(1.15);
    -webkit-backdrop-filter: blur(24px) saturate(220%) contrast(1.15) brightness(1.15);
    border: 1px solid rgba(255,255,255,0.18);
    border-top: 1.5px solid rgba(255,255,255,0.8);
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.45),
        inset 0 -10px 18px -10px rgba(255,255,255,0.06),
        0 16px 36px rgba(0,0,0,0.55);
    z-index: 1000;
}
.bottom-nav::before{
    content: "";
    position: absolute;
    top: -60%;
    left: -15%;
    width: 45%;
    height: 220%;
    background: linear-gradient(120deg, rgba(255,255,255,0.45), rgba(255,255,255,0) 60%);
    transform: rotate(-15deg);
    filter: blur(10px);
    mix-blend-mode: screen;
    pointer-events: none;
}

.nav-item{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    position: relative;
}
.nav-item span{
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 500;
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
}

.nav-home{
    margin-top: -30px;
}
.nav-home-circle{
    width: 58px;
    height: 58px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
}

/* ===== ایندیکیتور طلایی متحرک نوار پایین ===== */
.nav-indicator{
    position: absolute;
    top: 50%;
    left: 0;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(160deg, rgba(255,233,184,0.45), rgba(232,169,75,0.22));
    backdrop-filter: blur(16px) saturate(220%);
    -webkit-backdrop-filter: blur(16px) saturate(220%);
    border: 1.5px solid rgba(255,233,184,0.75);
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.55),
        inset 0 -6px 12px -8px rgba(0,0,0,0.3),
        0 10px 24px rgba(232,169,75,0.5);
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition:
        left 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
        top 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity 0.3s ease;
}
.nav-item{
    z-index: 1;
}
.nav-item.active span{
    color: rgba(255, 233, 184, 0.95);
}
.nav-item.active svg{
    filter: drop-shadow(0 0 6px rgba(232,169,75,0.65));
}

/* ===== صفحه پروفایل (Overlay) ===== */
.profile-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 2000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
}
.profile-overlay.open{
    opacity: 1;
    pointer-events: auto;
}
.profile-sheet{
    width: 100%;
    max-width: 420px;
    background: linear-gradient(160deg, rgba(28,28,32,0.95) 0%, rgba(10,10,12,0.97) 60%, rgba(20,20,23,0.95) 100%);
    backdrop-filter: blur(22px) saturate(200%);
    -webkit-backdrop-filter: blur(22px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.14);
    border-bottom: none;
    border-top: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 30px 30px 0 0;
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.25),
        0 -20px 50px rgba(0,0,0,0.6);
    padding: 22px 26px 34px;
    box-sizing: border-box;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.profile-overlay.open .profile-sheet{
    transform: translateY(0);
}
.profile-sheet-handle{
    width: 42px;
    height: 4px;
    border-radius: 999px;
    background: rgba(255,255,255,0.25);
    margin: 0 auto 18px;
}
.profile-sheet h2{
    color: rgba(247,247,247,1);
    font-family: 'Estedad', sans-serif;
    font-weight: 800;
    font-size: 18px;
    text-align: center;
    margin: 0 0 22px 0;
}
.profile-avatar-wrap{
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
}
.profile-avatar{
    width: 92px;
    height: 92px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03));
    border: 1.5px solid rgba(255,233,184,0.55);
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.4),
        0 8px 20px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
    cursor: pointer;
}
.profile-avatar img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}
.profile-avatar svg{
    opacity: 0.85;
}
.profile-avatar-edit{
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(160deg, #FFE9B8, #E8A94B);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(10,10,12,1);
    box-shadow: 0 4px 10px rgba(232,169,75,0.5);
}
.profile-field{
    margin-bottom: 16px;
}
.profile-field label{
    display: block;
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 500;
    font-size: 12.5px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 7px;
    text-align: right;
}
.profile-field input{
    width: 100%;
    box-sizing: border-box;
    padding: 13px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.16);
    color: rgba(247,247,247,0.95);
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 400;
    font-size: 14px;
    text-align: right;
    outline: none;
    transition: border-color 0.25s ease, background 0.25s ease;
}
.profile-field input:focus{
    border-color: rgba(232,169,75,0.65);
    background: rgba(255,255,255,0.09);
}
.profile-field input::placeholder{
    color: rgba(255,255,255,0.3);
}
.profile-submit{
    width: 100%;
    margin-top: 8px;
    padding: 14px 0;
    border-radius: 999px;
    text-align: center;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: rgba(20,15,5,0.95);
    background: linear-gradient(160deg, #FFE9B8 0%, #E8A94B 100%);
    border: none;
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.6),
        0 10px 24px rgba(232,169,75,0.4);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.profile-submit:active{
    transform: scale(0.97);
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.6),
        0 4px 12px rgba(232,169,75,0.4);
}
.profile-toast{
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(160deg, rgba(255,233,184,0.95), rgba(232,169,75,0.95));
    color: rgba(20,15,5,0.95);
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    padding: 12px 22px;
    border-radius: 999px;
    box-shadow: 0 10px 28px rgba(232,169,75,0.5);
    z-index: 3000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.profile-toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
/* صفحه کیف پول هم از همین استایل toast استفاده می‌کند */
.wallet-toast{
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(160deg, rgba(255,233,184,0.95), rgba(232,169,75,0.95));
    color: rgba(20,15,5,0.95);
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    padding: 12px 22px;
    border-radius: 999px;
    box-shadow: 0 10px 28px rgba(232,169,75,0.5);
    z-index: 3000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.wallet-toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ===== صفحه افزایش موجودی کیف پول (Overlay) ===== */
.wallet-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 2000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
}
.wallet-overlay.open{
    opacity: 1;
    pointer-events: auto;
}
.wallet-sheet{
    width: 100%;
    max-width: 420px;
    background: linear-gradient(160deg, rgba(28,28,32,0.95) 0%, rgba(10,10,12,0.97) 60%, rgba(20,20,23,0.95) 100%);
    backdrop-filter: blur(22px) saturate(200%);
    -webkit-backdrop-filter: blur(22px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.14);
    border-bottom: none;
    border-top: 1.5px solid rgba(255,255,255,0.5);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.25),
        0 -20px 50px rgba(0,0,0,0.6);
    padding: 22px 26px 34px;
    box-sizing: border-box;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.wallet-overlay.open .wallet-sheet{
    transform: translateY(0);
}
.wallet-sheet-handle{
    width: 42px;
    height: 4px;
    border-radius: 999px;
    background: rgba(255,255,255,0.25);
    margin: 0 auto 18px;
}
.wallet-sheet h2{
    color: rgba(247,247,247,1);
    font-family: 'Estedad', sans-serif;
    font-weight: 800;
    font-size: 18px;
    text-align: center;
    margin: 0 0 6px 0;
}
.wallet-balance-row{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 22px;
}
.wallet-balance-row span{
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 400;
    font-size: 12.5px;
    color: rgba(255,255,255,0.5);
}
.wallet-balance-row strong{
    font-family: 'Estedad', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: #FFE9B8;
    text-shadow: 0 0 10px rgba(232,169,75,0.5);
}

/* آیکون بزرگ کیف پول بالای کارت، صرفاً تزئینی */
.wallet-hero{
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
}
.wallet-hero-circle{
    width: 74px;
    height: 74px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, rgba(255,233,184,0.4), rgba(232,169,75,0.2));
    backdrop-filter: blur(16px) saturate(220%);
    -webkit-backdrop-filter: blur(16px) saturate(220%);
    border: 1.5px solid rgba(255,233,184,0.65);
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.55),
        inset 0 -6px 12px -8px rgba(0,0,0,0.3),
        0 10px 22px rgba(232,169,75,0.45);
}

.wallet-field{
    margin-bottom: 16px;
}
.wallet-field label{
    display: block;
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 500;
    font-size: 12.5px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 7px;
    text-align: right;
}
.wallet-field-input-wrap{
    position: relative;
    display: flex;
    align-items: center;
}
.wallet-field-input-wrap input{
    width: 100%;
    box-sizing: border-box;
    padding: 13px 50px 13px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.16);
